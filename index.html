<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikosys</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.6;
        }

        header {
            background-color: #f8f8f8;
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 1.1rem;
            color: #666;
            font-weight: 400;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .gallery {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .gallery img:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        footer {
            background-color: #f8f8f8;
            padding: 2rem 1rem;
            text-align: center;
            color: #666;
            border-top: 1px solid #e0e0e0;
            margin-top: 3rem;
        }

        footer p {
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            header {
                padding: 1.5rem 1rem;
            }

            main {
                padding: 1.5rem 1rem;
            }

            .gallery {
                gap: 1rem;
            }

            .gallery img {
                height: 200px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .tagline {
                font-size: 1rem;
            }

            .gallery {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }

            .gallery img {
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Mikosys</h1>
        <p class="tagline">Gallery</p>
    </header>

    <main>
        <div class="gallery">
            <img src="images/img1.jpg" alt="Gallery image 1">
            <img src="images/img2.jpg" alt="Gallery image 2">
            <img src="images/img3.jpg" alt="Gallery image 3">
            <img src="images/img4.jpg" alt="Gallery image 4">
            <img src="images/img5.jpg" alt="Gallery image 5">
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Mikosys. All rights reserved.</p>
    </footer>
</body>
</html>
